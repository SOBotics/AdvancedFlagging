name: build

on: [push, pull_request]

jobs:
  build:
    name: Build on Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [ 20, 22, 24 ]

    steps:
    - uses: actions/checkout@v6
    - name: Using Node ${{ matrix.node }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node }}
    - name: Install dependencies
      run: npm install
    - name: Compile
      run: npm run build
